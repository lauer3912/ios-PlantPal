name: PlantPal
options:
  bundleIdPrefix: com.ggsheng
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  developmentLanguage: en

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "9L6N2ZF26B"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  PlantPal:
    type: application
    platform: iOS
    sources:
      - path: PlantPal
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: PlantPal/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.PlantPal
        PRODUCT_NAME: PlantPal
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: NO
        DEVELOPMENT_TEAM: "9L6N2ZF26B"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
      configs:
        Debug:
          CODE_SIGNING_ALLOWED: NO
        Release:
          CODE_SIGNING_ALLOWED: YES

  PlantPalTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PlantPalTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: PlantPalTests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.PlantPalTests
        PRODUCT_NAME: PlantPalTests
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "9L6N2ZF26B"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PlantPal.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PlantPal"
        BUNDLE_LOADER: "$(TEST_HOST)"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
    dependencies:
      - target: PlantPal
        embed: false

  PlantPalUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PlantPalUITests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: PlantPalUITests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.PlantPalUITests
        PRODUCT_NAME: PlantPalUITests
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "9L6N2ZF26B"
        TEST_TARGET_NAME: PlantPal
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
    dependencies:
      - target: PlantPal
        embed: false

schemes:
  PlantPal:
    build:
      targets:
        PlantPal: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PlantPalTests
        - PlantPalUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
